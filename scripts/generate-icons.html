<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c" width="128" height="128"></canvas>
<script>
// Generate ImmerseFrançais icon at multiple sizes
const sizes = [16, 32, 48, 96, 128];

function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background: rounded teal square
  const r = size * 0.18; // border radius
  ctx.fillStyle = '#1B4965';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Letter "F" in white
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${size * 0.6}px 'Georgia', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', size / 2, size / 2 + size * 0.02);

  // Small coral accent dot
  ctx.fillStyle = '#E8734A';
  ctx.beginPath();
  ctx.arc(size * 0.75, size * 0.25, size * 0.08, 0, Math.PI * 2);
  ctx.fill();

  return canvas;
}

sizes.forEach(size => {
  const canvas = drawIcon(size);
  const link = document.createElement('a');
  link.download = `${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download ${size}x${size}`;
  link.style.display = 'block';
  link.style.margin = '8px';
  document.body.appendChild(link);

  // Show preview
  canvas.style.border = '1px solid #ccc';
  canvas.style.margin = '8px';
  document.body.appendChild(canvas);
});
</script>
</body>
</html>
